<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { background: #1e1e1e; color: #ccc; font-family: monospace; }
    .text-\[\#c586c0\] { color: #c586c0; }
    .text-\[\#ce9178\] { color: #ce9178; }
    .text-\[\#9cdcfe\] { color: #9cdcfe; }
    .flex { display: flex; }
    .mr-4 { margin-right: 1rem; }
  </style>
</head>
<body>
  <div class="flex">
    <div class="mr-4">1<br>2</div>
    <div>
      <pre><code id="content"></code></pre>
    </div>
  </div>
  <script>
    const displayedContent = `const developer = {
  name: "Ashish Kumar Nanda"\n};`;
    const html = displayedContent
      .replace(/"([^"\\]*(\\.[^"\\]*)*)"/g, '<span class="text-[#ce9178]">"$&"</span>')
      .replace(/'([^'\\]*(\\.[^'\\]*)*)'/g, '<span class="text-[#ce9178]">'+"'$&'"+'</span>')
      .replace(/\b(const|let|var|function|return|import|export)\b(?![^<]*>|[^<>]*<\/span>)/g, '<span class="text-[#c586c0]">$&</span>')
      .replace(/\b(true|false|null|undefined)\b(?![^<]*>|[^<>]*<\/span>)/g, '<span class="text-[#569cd6]">$&</span>')
      .replace(/([a-zA-Z_]\w*):(?![^<]*>|[^<>]*<\/span>)/g, '<span class="text-[#9cdcfe]">$1</span>:')
      .replace(/>""/g, '>"')
      .replace(/""</g, '"<');
    document.getElementById('content').innerHTML = html;
  </script>
</body>
</html>
